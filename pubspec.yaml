name: flutter_movie_app
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.4
  path_provider: ^2.1.0
  cached_network_image: ^3.3.0
  sliver_tools: ^0.2.5
  intl: ^0.19.0
  sqflite: ^2.3.0
  shared_preferences: ^2.2.0
  shimmer: ^3.0.0
  equatable: ^2.0.5
  connectivity_plus: ^4.0.0
  animate_do: ^3.1.2
  provider: ^6.1.0
  http: ^1.1.0
  flutter_svg: ^2.0.10
  infinite_scroll_pagination: ^3.2.0
  google_fonts: ^6.2.1
  carousel_slider: ^5.1.2
  api_cache_manager: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

